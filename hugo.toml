baseURL = 'https://IoTUS-ETSII-US.github.io/'
languageCode = 'es'
title = 'IOT'
theme = 'papermod'

canonifyURLs = true # Esto ayuda a que Hugo convierta rutas relativas en absolutas
defaultContentLanguage = 'es' # Idioma principal

author = "Departamento de IOT"

[menus]
  [[menus.main]]
    name = 'home'
    url = '/'
    weight = 10
  [[menus.main]]
    name = 'directive'
    url = '/directive'
    weight = 20
  [[menus.main]]
    name = 'projects'
    url = '/projects'
    weight = 30
  [[menus.main]]
    name = 'events'
    url = '/events'
    weight = 40
  [[menus.main]]
    name = 'contact'
    url = '/contact'
    weight = 50
  [[menus.main]]
    name = 'inscription'
    url = '/inscription'
    weight = 60

[params.label]
  icon = "/images/logo_transparent.png"
  # iconHeight = 45

# Configuracion para TAILWIND

[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'
  [[build.cachebusters]]
    source = '(postcss|tailwind)\.config\.js'
    target = 'css'
[module]
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'